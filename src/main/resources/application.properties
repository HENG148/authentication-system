spring.application.name=authentication-system

# ================================================================
# APPLICATION NAME
# ================================================================
# spring.application.name=auth-system

# ================================================================
# SERVER CONFIGURATION
# Port the application runs on (default: 8080)
# ================================================================
server.port=8080

# ================================================================
# DATABASE CONFIGURATION (MySQL)
# ----------------------------------------------------------------
# IMPORTANT: Update these values to match your MySQL setup:
#   - Replace 'localhost' if your DB is on a different host
#   - Replace '3306' if your MySQL uses a different port
#   - Replace 'auth_db' with your database name
#   - Replace 'root' with your MySQL username
#   - Replace 'your_password' with your MySQL password
# ================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=sokheng017
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================================================
# JPA / HIBERNATE CONFIGURATION
# ----------------------------------------------------------------
# hibernate.ddl-auto options:
#   create       -> drops and creates tables on every startup (dev only)
#   create-drop  -> drops tables when app shuts down
#   update       -> updates schema without dropping data (recommended for dev)
#   validate     -> validates schema but makes no changes
#   none         -> no action (recommended for production)
# ================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================================================
# JWT CONFIGURATION
# ----------------------------------------------------------------
# secret: A long, random, secure string used to sign JWT tokens.
#         In production, use an environment variable instead!
# expiration: Token validity in milliseconds.
#             86400000 = 24 hours
# ================================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ================================================================
# LOGGING CONFIGURATION
# ================================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.authsystem=DEBUG